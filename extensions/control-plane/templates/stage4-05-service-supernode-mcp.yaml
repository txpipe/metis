{{- if .Values.supernodeMcp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: supernode-mcp
  namespace: '{{ .Values.namespace }}'
  labels:
    app.kubernetes.io/name: supernode-mcp
    app.kubernetes.io/component: mcp
{{- $mcpServiceType := default "ClusterIP" .Values.supernodeMcp.service.type }}
spec:
  type: {{ $mcpServiceType }}
  selector:
    app.kubernetes.io/name: supernode-mcp
  ports:
  - name: http
    port: {{ .Values.supernodeMcp.service.port }}
    targetPort: http
    protocol: TCP
{{- if and (eq $mcpServiceType "NodePort") (not (empty .Values.supernodeMcp.service.nodePort)) }}
    nodePort: {{ .Values.supernodeMcp.service.nodePort }}
{{- end }}
{{- end }}
