apiVersion: v2
name: control-plane
description: Observability control-plane components derived from Terraform module.
type: application
version: 0.2.1-rc4
appVersion: "0.2.1"
dependencies:
  - name: vault
    version: 0.32.0
    repository: https://helm.releases.hashicorp.com
    condition: vault.enabled
  - name: vault-secrets-operator
    alias: vaultSecretsOperator
    version: 1.3.0
    repository: https://helm.releases.hashicorp.com
    condition: vaultSecretsOperator.enabled
