namespace: control-plane
storageClass: standard

vault:
  enabled: true
  injector:
    enabled: false
  csi:
    enabled: false
  ui:
    enabled: true
  server:
    logLevel: info
    dev:
      enabled: false
      devRootToken: root
    authDelegator:
      enabled: true
    dataStorage:
      enabled: true
      size: 10Gi
      storageClass: standard
    auditStorage:
      enabled: false
    serviceAccount:
      create: true
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        memory: 512Mi
    standalone:
      enabled: false
      config: |-
        {{ include "control-plane.vaultConfigCommon" . }}

        storage "file" {
          path = "/vault/data"
        }
    ha:
      enabled: true
      replicas: 3
      raft:
        enabled: true
        setNodeId: true
        config: |-
          {{ include "control-plane.vaultConfigCommon" . }}

          storage "raft" {
            path = "/vault/data"
          }

          service_registration "kubernetes" {}
  serverTelemetry:
    serviceMonitor:
      enabled: true
      selectors:
        app.kubernetes.io/component: o11y
  integration:
    enabled: true
    connection:
      address: ""
      tlsServerName: ""
      skipTLSVerify: false
      caCertSecretRef: ""
      headers: {}
    auth:
      namespace: ""
      allowedNamespaces:
        - "*"
      mount: kubernetes
      role: control-plane
      serviceAccount:
        create: true
        name: vault-auth
      audiences: []
      tokenExpirationSeconds: 600
    seal:
      mode: shamir
      awskms:
        region: ""
        kmsKeyId: ""
        endpoint: ""
      gcpckms:
        project: ""
        region: ""
        keyRing: ""
        cryptoKey: ""
      azurekeyvault:
        tenantId: ""
        clientId: ""
        vaultName: ""
        keyName: ""
        environment: ""
        resource: ""
      ocikms:
        keyId: ""
        cryptoEndpoint: ""
        managementEndpoint: ""
        authTypeApiKey: false
      transit:
        address: ""
        keyName: ""
        mountPath: transit/
        namespace: ""
        disableRenewal: false
        tlsCaCert: ""
        tlsClientCert: ""
        tlsClientKey: ""
        tlsServerName: ""
        tlsSkipVerify: false

vaultSecretsOperator:
  enabled: true
  nameOverride: vault-secrets-operator
  fullnameOverride: vault-secrets-operator
  defaultVaultConnection:
    enabled: false
  defaultAuthMethod:
    enabled: false
  telemetry:
    serviceMonitor:
      enabled: false
  csi:
    enabled: false

prometheusOperator:
  tolerations: []
  resources:
    limits:
      memory: 500Mi
    requests:
      cpu: 250m
      memory: 500Mi
grafana:
  service:
    type: ClusterIP
    nodePort: 30000
  tolerations: []
  resources:
    limits:
      cpu: 200m
      memory: 400Mi
    requests:
      cpu: 100m
      memory: 400Mi
  persistence:
    resources:
      requests:
        storage: 5Gi
supernodeDashboard:
  service:
    type: ClusterIP
    nodePort: 30001
  tolerations: []
  resources:
    limits:
      cpu: 2000m
      memory: 400Mi
    requests:
      cpu: 500m
      memory: 400Mi

supernodeMcp:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/txpipe/metis-mcp
    tag: 8892dfba4267bc7159dfd7644c203496ffbf3d90
    pullPolicy: IfNotPresent
  auth:
    mode: trusted
  logLevel: info
  bindAddr: 0.0.0.0:8443
  extensionCatalog:
    source: oci
    ociRef: oci://oci.supernode.store/extension-catalog@sha256:623004147b13c18ffa6fdbb701da9001304518d8fd4a1988cc667f8ebd3e0419
    maxBytes: 1048576
    allowUntrusted: false
  sessionStore:
    type: sqlite
    sqlitePath: /var/lib/supernode-mcp/sessions.sqlite3
    ttlSeconds: 86400
  helm:
    valuesDir: /var/lib/supernode-mcp/helm/values
    cacheHome: /var/lib/supernode-mcp/helm/cache
    configHome: /var/lib/supernode-mcp/helm/config
    dataHome: /var/lib/supernode-mcp/helm/data
  persistence:
    size: 10Gi
    enabled: true
    existingClaim: ""
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    annotations: {}
  serviceAccount:
    create: true
    name: supernode-mcp
  service:
    type: ClusterIP
    port: 8443
    nodePort: null
  vault:
    addr: ""
    kvMount: kv
    tokenSecretRef:
      name: ""
      key: token
    tokenFile: ""
  podAnnotations: {}
  tolerations: []
  nodeSelector: {}
  affinity: {}
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

prometheus:
  tolerations: []
  resources:
    requests:
      memory: 400Mi
  storage:
    resources:
      requests:
        storage: 40Gi
