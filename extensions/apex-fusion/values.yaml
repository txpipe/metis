nameOverride: ""
fullnameOverride: ""
displayName: ""

image:
  repository: ghcr.io/blinklabs-io/cardano-node
  tag: "10.1.4"
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

# Advanced override for clusters that do not use the default shared Vault auth
# provided by the control-plane extension.
vaultAuth:
  ref: control-plane/default
  serviceAccount:
    create: true
    name: vault-auth

podAnnotations: {}
extraLabels: {}

podSecurityContext: {}

securityContext: {}

resources: {}

priorityClassName: ""

service:
  # Service-facing ports. Internal container ports are configured separately
  # under node.*Port and proxy.n2cPort.
  type: ClusterIP
  annotations: {}
  labels: {}
  clusterIP: ""
  loadBalancerIP: ""
  externalTrafficPolicy: ""
  n2nPort: 3000
  n2nNodePort: null
  n2cPort: 3307
  n2cNodePort: null
  metricsPort: 12789
  metricsNodePort: null
  extraPorts: []

persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  annotations: {}
  size: 20Gi
  existingClaim: ""

node:
  replicas: 1
  n2nPort: 3000
  metricsPort: 12789
  command: []
  env: []
  envFrom: []
  extraVolumeMounts: []
  extraVolumes: []
  extraContainers: []
  initContainers: []
  network: vector-testnet
  networkMagic: null
  socketPath: /ipc/node.socket
  topology:
    mode: image-default
    relayTargets: []
    localRoots: []
    publicRoots: []
    useLedgerAfterSlot: 0
  blockProducer:
    enabled: false
    debug: false
    poolId: ""
    mountPath: /block-producer
    kesKeyFile: kes.skey
    vrfKeyFile: vrf.skey
    operationalCertificateFile: op.cert
    vaultStaticSecret:
      mount: kv
      path: ""
      refreshAfter: 1m
  terminationGracePeriodSeconds: 60

configuration:
  create: false
  name: ""
  mountPath: /configuration
  files: {}

proxy:
  enabled: true
  n2cPort: 3307
  image:
    repository: nginx
    tag: "1.25.5"
    pullPolicy: IfNotPresent
  resources:
    limits:
      memory: 100Mi
    requests:
      cpu: 10m
      memory: 100Mi
  env: []
  envFrom: []
  extraVolumeMounts: []
  containerSecurityContext: {}
  config:
    create: true
    name: ""
    filename: nginx.conf
    data: |-
      user root;

      events {
          worker_connections 1024;
      }

      stream {
        server {
          listen {{ .Values.proxy.n2cPort }};
          proxy_pass unix:/ipc/node.socket;
          proxy_connect_timeout 30s;
          proxy_timeout 180m;
        }
      }

livenessProbe:
  enabled: false
  exec:
    command:
      - /bin/sh
      - -c
      - test -S /ipc/node.socket
  initialDelaySeconds: 30
  periodSeconds: 30

readinessProbe:
  enabled: false
  exec:
    command:
      - /bin/sh
      - -c
      - test -S /ipc/node.socket
  initialDelaySeconds: 10
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
