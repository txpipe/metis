{{- $fullName := include "dolos.fullname" . -}}
{{- $selectorLabels := include "dolos.selectorLabels" . -}}
{{- $configMapName := include "dolos.configurationConfigMapName" . -}}
{{- $metricsConfigMapName := include "dolos.metricsConfigMapName" . -}}
{{- $configChecksum := include (print $.Template.BasePath "/configmap-config.yaml") . | sha256sum -}}
{{- $configDir := "/etc/config" -}}
{{- $configPath := "/etc/config/dolos.toml" -}}
{{- $dolosArgs := default (list "-c" $configPath "daemon") .Values.dolos.args -}}
{{- $defaultBootstrapArgs := list "-c" $configPath "bootstrap" "snapshot" "--variant" "full" -}}
{{- $bootstrapArgs := default $defaultBootstrapArgs .Values.dolos.bootstrap.args -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "dolos.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dolos.replicas | int }}
  selector:
    matchLabels:
{{- $selectorLabels | nindent 6 }}
  serviceName: {{ printf "%s-headless" $fullName }}
  template:
    metadata:
      labels:
{{- $selectorLabels | nindent 8 }}
      annotations:
        checksum/config: {{ $configChecksum }}
    spec:
      serviceAccountName: {{ $fullName }}
      terminationGracePeriodSeconds: 180
      {{- if .Values.dolos.bootstrap.enabled }}
      initContainers:
        - name: {{ default "bootstrap" .Values.dolos.bootstrap.name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          {{- with .Values.dolos.bootstrap.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if $bootstrapArgs }}
          args:
            {{- toYaml $bootstrapArgs | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/data
            - name: config
              mountPath: {{ $configDir }}
      {{- end }}
      containers:
        - name: dolos
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          {{- with .Values.dolos.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if $dolosArgs }}
          args:
            {{- toYaml $dolosArgs | nindent 12 }}
          {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
            - name: ouroboros
              containerPort: {{ .Values.service.ouroborosPort }}
              protocol: TCP
            - name: minibf
              containerPort: {{ .Values.service.minibfPort }}
              protocol: TCP
            - name: minikupo
              containerPort: {{ .Values.service.minikupoPort }}
              protocol: TCP
            - name: trp
              containerPort: {{ .Values.service.trpPort }}
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/data
            - name: config
              mountPath: {{ $configDir }}
            - name: metrics-scripts
              mountPath: /opt/metis/bin/metrics.sh
              subPath: metrics.sh
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ $configMapName }}
        - name: metrics-scripts
          configMap:
            name: {{ $metricsConfigMapName }}
            defaultMode: 0555
        {{- if .Values.persistence.existingClaim }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
        {{- end }}
  {{- if not .Values.persistence.existingClaim }}
  volumeClaimTemplates:
    - metadata:
        name: data
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
