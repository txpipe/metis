{{- $fullName := include "midnight.fullname" . -}}
{{- $nodeKeySecretName := include "midnight.nodeKeySecretName" . -}}
{{- $dbSyncSecretName := include "midnight.dbSyncSecretName" . -}}
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ printf "%s-node-key" $fullName | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "midnight.labels" . | nindent 4 }}
spec:
  vaultAuthRef: {{ .Values.vaultAuth.ref | quote }}
  type: kv-v2
  mount: {{ .Values.nodeKey.vaultStaticSecret.mount | quote }}
  path: {{ required "nodeKey.vaultStaticSecret.path is required" .Values.nodeKey.vaultStaticSecret.path | quote }}
  refreshAfter: {{ .Values.nodeKey.vaultStaticSecret.refreshAfter | quote }}
  rolloutRestartTargets:
    - kind: StatefulSet
      name: {{ $fullName }}
  destination:
    name: {{ $nodeKeySecretName | quote }}
    create: true
    overwrite: true
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ printf "%s-dbsync" $fullName | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "midnight.labels" . | nindent 4 }}
spec:
  vaultAuthRef: {{ .Values.vaultAuth.ref | quote }}
  type: kv-v2
  mount: {{ .Values.dbSync.vaultStaticSecret.mount | quote }}
  path: {{ required "dbSync.vaultStaticSecret.path is required" .Values.dbSync.vaultStaticSecret.path | quote }}
  refreshAfter: {{ .Values.dbSync.vaultStaticSecret.refreshAfter | quote }}
  rolloutRestartTargets:
    - kind: StatefulSet
      name: {{ $fullName }}
  destination:
    name: {{ $dbSyncSecretName | quote }}
    create: true
    overwrite: true
