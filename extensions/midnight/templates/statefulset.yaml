{{- $fullName := include "midnight.fullname" . -}}
{{- $selectorLabels := include "midnight.selectorLabels" . -}}
{{- $serviceAccountName := include "midnight.serviceAccountName" . -}}
{{- $dbSyncSecretName := include "midnight.dbSyncSecretName" . -}}
{{- $dbSyncSecretKey := include "midnight.dbSyncSecretKey" . -}}
{{- $nodeKeySecretName := include "midnight.nodeKeySecretName" . -}}
{{- $nodeKeySecretKey := include "midnight.nodeKeySecretKey" . -}}
{{- $metricsConfigMapName := include "midnight.metricsConfigMapName" . -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "midnight.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.node.replicas | int }}
  selector:
    matchLabels:
{{- $selectorLabels | nindent 6 }}
  serviceName: {{ printf "%s-headless" $fullName }}
  template:
    metadata:
      labels:
{{- $selectorLabels | nindent 8 }}
    spec:
      serviceAccountName: {{ $serviceAccountName }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: midnight
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          env:
            - name: MIDNIGHT_NODE_IMAGE
              value: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            - name: CFG_PRESET
              value: {{ .Values.node.cfgPreset | quote }}
            - name: BASE_PATH
              value: "/node/chain"
            - name: BOOTNODES
              value: {{ include "midnight.bootnodes" . | quote }}
            - name: APPEND_ARGS
              value: {{ include "midnight.appendArgs" . | quote }}
            - name: DB_SYNC_POSTGRES_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSyncSecretName }}
                  key: {{ $dbSyncSecretKey }}
            - name: NODE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $nodeKeySecretName }}
                  key: {{ $nodeKeySecretKey }}
          ports:
            - name: rpc
              containerPort: {{ .Values.service.rpcPort }}
              protocol: TCP
            - name: p2p
              containerPort: {{ .Values.service.p2pPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
              protocol: TCP
          volumeMounts:
            - name: chain-data
              mountPath: /node
            - name: runtime-data
              mountPath: /data
            - name: metrics-scripts
              mountPath: /opt/metis/bin/metrics.sh
              subPath: metrics.sh
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: rpc
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: rpc
            initialDelaySeconds: 10
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: runtime-data
          emptyDir: {}
        - name: metrics-scripts
          configMap:
            name: {{ $metricsConfigMapName }}
            defaultMode: 0555
        {{- if .Values.persistence.existingClaim }}
        - name: chain-data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
        {{- end }}
  {{- if not .Values.persistence.existingClaim }}
  volumeClaimTemplates:
    - metadata:
        name: chain-data
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
