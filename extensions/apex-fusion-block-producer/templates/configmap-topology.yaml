{{- $localRoots := list -}}
{{- if gt (int .Values.relays.count) 0 }}
{{- range $index := until (int .Values.relays.count) }}
{{- $serviceName := include "apex-fusion.relayName" (dict "context" $ "index" $index) -}}
{{- $accessPoint := dict "address" (printf "%s.%s.svc.cluster.local" $serviceName $.Release.Namespace) "port" $.Values.service.n2nPort -}}
{{- $localRoots = append $localRoots (dict "accessPoints" (list $accessPoint) "advertise" false "valency" 1) -}}
{{- end }}
{{- else }}
{{- range $target := .Values.relays.trusted }}
{{- $accessPoint := dict "address" $target.address "port" (default 3000 $target.port) -}}
{{- $localRoots = append $localRoots (dict "accessPoints" (list $accessPoint) "advertise" false "valency" (default 1 $target.valency)) -}}
{{- end }}
{{- end }}
{{- $topology := dict "localRoots" $localRoots "publicRoots" (list) "useLedgerAfterSlot" (default -1 .Values.relays.useLedgerAfterSlot) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "apex-fusion.topologyConfigMapName" . }}
  labels:
    {{- include "apex-fusion.labels" . | nindent 4 }}
data:
  topology.json: |
{{ toPrettyJson $topology | indent 4 }}
