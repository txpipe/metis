apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "apex-fusion.proxyConfigName" . }}
  labels:
    {{- include "apex-fusion.labels" . | nindent 4 }}
data:
  nginx.conf: |-
    user root;
    events {
        worker_connections 1024;
    }
    stream {
      server {
        listen {{ .Values.proxy.n2cPort }};
        proxy_pass unix:/ipc/node.socket;
        proxy_connect_timeout 30s;
        proxy_timeout 180m;
      }
    }
