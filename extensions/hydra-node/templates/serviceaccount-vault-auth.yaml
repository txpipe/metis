{{- if and .Values.keys.vaultAuth.serviceAccount.create (or .Values.keys.hydraSigning.vaultStaticSecret.enabled (and .Values.keys.cardano.enabled .Values.keys.cardano.signing.vaultStaticSecret.enabled)) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.keys.vaultAuth.serviceAccount.name | quote }}
  labels:
    {{- include "hydra-node.labels" . | nindent 4 }}
{{- end }}
