{{- $fullName := include "hydra-node.fullname" . -}}
{{- $hydraSigningSecretName := include "hydra-node.hydraSigningSecretName" . -}}
{{- $cardanoSigningSecretName := include "hydra-node.cardanoSigningSecretName" . -}}
{{- if .Values.keys.hydraSigning.vaultStaticSecret.enabled }}
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ printf "%s-hydra-signing" $fullName | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "hydra-node.labels" . | nindent 4 }}
spec:
  vaultAuthRef: {{ .Values.keys.vaultAuth.ref | quote }}
  type: kv-v2
  mount: {{ .Values.keys.hydraSigning.vaultStaticSecret.mount | quote }}
  path: {{ required "keys.hydraSigning.vaultStaticSecret.path is required when Vault sync is enabled" .Values.keys.hydraSigning.vaultStaticSecret.path | quote }}
  refreshAfter: {{ .Values.keys.hydraSigning.vaultStaticSecret.refreshAfter | quote }}
  rolloutRestartTargets:
    - kind: StatefulSet
      name: {{ $fullName }}
  destination:
    name: {{ $hydraSigningSecretName | quote }}
    create: true
    overwrite: true
{{- end }}
{{- if and .Values.keys.hydraSigning.vaultStaticSecret.enabled .Values.keys.cardano.enabled .Values.keys.cardano.signing.vaultStaticSecret.enabled }}
---
{{- end }}
{{- if and .Values.keys.cardano.enabled .Values.keys.cardano.signing.vaultStaticSecret.enabled }}
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ printf "%s-cardano-signing" $fullName | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "hydra-node.labels" . | nindent 4 }}
spec:
  vaultAuthRef: {{ .Values.keys.vaultAuth.ref | quote }}
  type: kv-v2
  mount: {{ .Values.keys.cardano.signing.vaultStaticSecret.mount | quote }}
  path: {{ required "keys.cardano.signing.vaultStaticSecret.path is required when Vault sync is enabled" .Values.keys.cardano.signing.vaultStaticSecret.path | quote }}
  refreshAfter: {{ .Values.keys.cardano.signing.vaultStaticSecret.refreshAfter | quote }}
  rolloutRestartTargets:
    - kind: StatefulSet
      name: {{ $fullName }}
  destination:
    name: {{ $cardanoSigningSecretName | quote }}
    create: true
    overwrite: true
{{- end }}
