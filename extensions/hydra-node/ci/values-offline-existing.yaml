persistence:
  storageClass: standard

ledger:
  protocolParameters:
    create: false
    name: hydra-existing-protocol
  initialUtxo:
    create: false
    name: hydra-existing-utxo

keys:
  hydraSigning:
    vaultStaticSecret:
      path: runtime/hydra/offline-existing/hydra-signing
  hydraVerification:
    existingConfigMap:
      name: hydra-existing-verification
    items:
      - filename: hydra-self.vk
      - filename: hydra-peer.vk
