node:
  offlineMode: false
  hydraScriptsTxId: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
  cardanoSocketProxy:
    enabled: true
    targetHost: relay.cardano.example.com
    targetPort: 3001
    targetScheme: OPENSSL
    targetOptions: verify=0
    socketPath: /ipc/node.socket

keys:
  hydraSigning:
    vaultStaticSecret:
      path: runtime/hydra/online/hydra-signing
  hydraVerification:
    items:
      - filename: hydra-self.vk
        value: |-
          online-hydra-self-verification-key
      - filename: hydra-peer.vk
        value: |-
          online-hydra-peer-verification-key
  cardano:
    enabled: true
    socketPath: /ipc/node.socket
    signing:
      vaultStaticSecret:
        path: runtime/hydra/online/cardano-signing
    verification:
      value: |-
        online-cardano-verification-key
