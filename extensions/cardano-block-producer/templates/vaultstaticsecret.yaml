apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ include "cardano-node.blockProducerSecretName" . }}
  labels:
    {{- include "cardano-node.labels" . | nindent 4 }}
spec:
  vaultAuthRef: {{ .Values.vaultAuth.ref | quote }}
  type: kv-v2
  mount: {{ .Values.blockProducer.vaultStaticSecret.mount | quote }}
  path: {{ .Values.blockProducer.vaultStaticSecret.path | quote }}
  refreshAfter: {{ .Values.blockProducer.vaultStaticSecret.refreshAfter | quote }}
  rolloutRestartTargets:
    - kind: StatefulSet
      name: {{ include "cardano-node.fullname" . }}
  destination:
    name: {{ include "cardano-node.blockProducerSecretName" . | quote }}
    create: true
    overwrite: true
