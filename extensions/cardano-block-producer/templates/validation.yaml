{{- if not .Values.vaultAuth.ref }}
{{- fail "effective vaultAuth.ref is empty; the chart defaults to control-plane/default, so only override this if your cluster uses a different shared VaultAuth resource" }}
{{- end }}
{{- if not .Values.blockProducer.vaultStaticSecret.mount }}
{{- fail "blockProducer.vaultStaticSecret.mount is required" }}
{{- end }}
{{- if not .Values.blockProducer.vaultStaticSecret.path }}
{{- fail "blockProducer.vaultStaticSecret.path is required" }}
{{- end }}
{{- if and (eq (int .Values.relays.count) 0) (not .Values.relays.trusted) }}
{{- fail "relays.trusted is required when relays.count=0" }}
{{- end }}
