name: Check extensions

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/check_extensions.yml"
      - "extensions/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/check_extensions.yml"
      - "extensions/**"

jobs:
  helm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./extensions
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: vault-static-secret
            valuesArgs: "-f midnight/ci/values-vault-static-secret.yaml"
            dir: midnight
          - name: default
            valuesArgs: "-f cardano-db-sync/ci/values-default.yaml"
            dir: cardano-db-sync
          - name: socket-proxy
            valuesArgs: "-f cardano-db-sync/ci/values-socket-proxy.yaml"
            dir: cardano-db-sync
          - name: default
            valuesArgs: "-f cardano-relay/ci/values-default.yaml"
            dir: cardano-relay
          - name: default
            valuesArgs: "-f cardano-block-producer/ci/values-default.yaml"
            dir: cardano-block-producer
          - name: debug
            valuesArgs: "-f cardano-block-producer/ci/values-debug.yaml"
            dir: cardano-block-producer
          - name: relay-loadbalancer
            valuesArgs: "-f cardano-block-producer/ci/values-relay-loadbalancer.yaml"
            dir: cardano-block-producer
          - name: trusted-relay
            valuesArgs: "-f cardano-block-producer/ci/values-trusted-relay.yaml"
            dir: cardano-block-producer
          - name: default
            valuesArgs: ""
            dir: control-plane
          - name: default
            valuesArgs: "-f apex-fusion-relay/ci/values-default.yaml"
            dir: apex-fusion-relay
          - name: default
            valuesArgs: "-f apex-fusion-block-producer/ci/values-default.yaml"
            dir: apex-fusion-block-producer
          - name: debug
            valuesArgs: "-f apex-fusion-block-producer/ci/values-debug.yaml"
            dir: apex-fusion-block-producer
          - name: relay-loadbalancer
            valuesArgs: "-f apex-fusion-block-producer/ci/values-relay-loadbalancer.yaml"
            dir: apex-fusion-block-producer
          - name: trusted-relay
            valuesArgs: "-f apex-fusion-block-producer/ci/values-trusted-relay.yaml"
            dir: apex-fusion-block-producer
          - name: default
            valuesArgs: "-f dolos/ci/values-default.yaml"
            dir: dolos
          - name: offline-inline
            valuesArgs: "-f hydra-node/ci/values-offline-inline.yaml"
            dir: hydra-node
          - name: offline-existing
            valuesArgs: "-f hydra-node/ci/values-offline-existing.yaml"
            dir: hydra-node
          - name: online-inline
            valuesArgs: "-f hydra-node/ci/values-online-inline.yaml"
            dir: hydra-node
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.0

      - name: Add Helm repositories
        run: |
          helm repo add hashicorp https://helm.releases.hashicorp.com

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz -o kubeconform.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Build Helm dependencies (${{ matrix.dir }})
        run: |
          if grep -q '^dependencies:' ./${{ matrix.dir }}/Chart.yaml; then
            helm dependency build ./${{ matrix.dir }}
          fi

      - name: Helm lint (${{ matrix.name }} - ${{ matrix.dir }})
        run: helm lint ./${{ matrix.dir }} ${{ matrix.valuesArgs }}

      - name: Template manifests and validate schema (${{ matrix.name }} - ${{ matrix.dir }})
        run: |
          helm template ${{ matrix.dir }} ./${{ matrix.dir }} ${{ matrix.valuesArgs }} | kubeconform -strict -skip PodMonitor,ServiceMonitor,Prometheus,VaultConnection,VaultAuth,VaultStaticSecret -summary -
