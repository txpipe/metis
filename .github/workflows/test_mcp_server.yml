name: Test MCP server

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/test_mcp_server.yml"
      - "mcp-server/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/test_mcp_server.yml"
      - "mcp-server/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mcp-server
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Test
        run: cargo test
